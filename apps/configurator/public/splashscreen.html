<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBHE Configurator</title>
    <style>
      :root {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 5.9% 10%;
        --card-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --muted-foreground: 240 5% 64.9%;
        --border: 240 3.7% 15.9%;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: "Geist Variable", "Inter Variable", "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: hsl(var(--background));
        color: hsl(var(--foreground));
      }

      .splash {
        width: 100%;
        max-width: 360px;
        border-radius: 12px;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--card));
        color: hsl(var(--card-foreground));
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.25),
          0 10px 24px rgba(0, 0, 0, 0.3);
        padding: 18px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--background));
        display: inline-flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
      }

      .logo img {
        width: 22px;
        height: 22px;
        object-fit: contain;
      }

      .title {
        margin: 0;
        font-size: 14px;
        line-height: 1.15;
        font-weight: 600;
      }

      .subtitle {
        margin: 0;
        margin-top: 4px;
        font-size: 12px;
        color: hsl(var(--muted-foreground));
      }

      .progress {
        margin-top: 16px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--background));
        overflow: hidden;
        position: relative;
      }

      .progress > span {
        display: block;
        width: 38%;
        height: 100%;
        border-radius: 999px;
        background: hsl(var(--primary));
        animation: loading 1.1s infinite ease-in-out;
      }

      @keyframes loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(295%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .progress > span {
          animation: none;
          transform: translateX(0%);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" role="status" aria-live="polite">
      <div class="row">
        <div class="logo" aria-hidden="true">
          <img src="./icon.png" alt="" />
        </div>
        <div>
          <h1 class="title">KBHE Configurator</h1>
          <p class="subtitle">Loading workspace and connecting services...</p>
        </div>
      </div>
      <div class="progress" aria-hidden="true"><span></span></div>
    </div>
  </body>
</html>
