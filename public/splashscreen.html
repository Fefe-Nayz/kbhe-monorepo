<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBHE Configurator</title>
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --muted-foreground: 240 3.8% 46.1%;
        --border: 240 5.9% 90%;
        --ring: 240 5% 64.9%;
        --radius: 10px;
      }

      .dark {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 5.9% 10%;
        --card-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --muted-foreground: 240 5% 64.9%;
        --border: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: "Geist Variable", "Inter Variable", "Segoe UI", sans-serif;
        background: hsl(var(--background));
        color: hsl(var(--foreground));
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 360px;
        border-radius: var(--radius);
        border: 1px solid hsl(var(--border));
        background: hsl(var(--card));
        color: hsl(var(--card-foreground));
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 18px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--background));
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .logo::after {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: hsl(var(--primary));
        animation: pulse 1.4s ease-in-out infinite;
      }

      .title {
        margin: 0;
        font-size: 14px;
        line-height: 1.15;
        font-weight: 600;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        margin-top: 4px;
        font-size: 12px;
        color: hsl(var(--muted-foreground));
      }

      .progress {
        margin-top: 16px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--background));
        overflow: hidden;
        position: relative;
      }

      .progress > span {
        display: block;
        width: 36%;
        height: 100%;
        border-radius: 999px;
        background: hsl(var(--primary));
        animation: loading 1.1s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.85);
          opacity: 0.75;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(295%);
        }
      }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem("kbhe-theme");
        var dark =
          stored === "dark" ||
          ((stored === "system" || !stored) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.add(dark ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <div class="card" role="status" aria-live="polite">
      <div class="row">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1 class="title">KBHE Configurator</h1>
          <p class="subtitle">Loading workspace and connecting services...</p>
        </div>
      </div>
      <div class="progress" aria-hidden="true"><span></span></div>
    </div>
  </body>
</html>
